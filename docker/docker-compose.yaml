services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auth_server
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_server"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    container_name: diesel-migration
    image: auth_server_migrate:latest
    build:
      context: ../api
      dockerfile: ../docker/Dockerfile
      target: builder
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /app
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/auth_server
    command: ["diesel", "migration", "run"]

  app:
    image: auth_server:latest
    container_name: auth_server
    build:
      context: ../api
      dockerfile: ../docker/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file:
      - ../api/.env
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  postgres_data: